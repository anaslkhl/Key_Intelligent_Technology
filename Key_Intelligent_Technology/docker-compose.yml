services:
    app:
        build: .
        container_name: key_intelligent_app
        ports:
            - "8000:8000"
        volumes:
            - .:/var/www/html
        depends_on:
            - database
        environment:
            - DB_HOST=database
            - DB_PORT=5432
            - DB_DATABASE=key_intelligent_db
            - DB_USERNAME=key_intelligent_user
            - DB_PASSWORD=secure_password_123

    webserver:
        image: nginx:alpine
        container_name: key_intelligent_nginx
        ports:
            - "8080:80"
        volumes:
            - .:/var/www/html
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app

    database:
        image: postgres:15
        container_name: key_intelligent_postgres
        environment:
            POSTGRES_DB: key_intelligent_db
            POSTGRES_USER: key_intelligent_user
            POSTGRES_PASSWORD: secure_password_123
        ports:
            - "5433:5432"
        volumes:
            - db_data:/var/lib/postgresql/data

    pgadmin:
        image: dpage/pgadmin4:latest
        container_name: key_intelligent_pgadmin
        environment:
            PGADMIN_DEFAULT_EMAIL: admin@keyintelligent.com
            PGADMIN_DEFAULT_PASSWORD: admin123
        ports:
            - "8088:80"
        depends_on:
            - database

volumes:
    db_data: