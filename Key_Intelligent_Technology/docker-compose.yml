version: "3.8"

services:
  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: key_intelligent_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - key_intelligent_network
    depends_on:
      - app

  # PHP Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: key_intelligent_app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    networks:
      - key_intelligent_network
    depends_on:
      - mysql
      - redis
    environment:
      - APP_ENV=local
      - APP_DEBUG=true

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: key_intelligent_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: key_intelligent
      MYSQL_USER: key_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - key_intelligent_network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: key_intelligent_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - key_intelligent_network

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: key_intelligent_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "8080:80"
    networks:
      - key_intelligent_network
    depends_on:
      - mysql

networks:
  key_intelligent_network:
    driver: bridge

volumes:
  mysql_data: